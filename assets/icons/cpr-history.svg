<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGlow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#E3F2FD;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#BBDEFB;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="clipboardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#42A5F5"/>
      <stop offset="100%" style="stop-color:#1565C0"/>
    </linearGradient>
    <linearGradient id="clipGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E88E5"/>
      <stop offset="100%" style="stop-color:#0D47A1"/>
    </linearGradient>
    <linearGradient id="paperGrad" x1="0%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#E3F2FD"/>
    </linearGradient>
    <linearGradient id="cane1Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2E7D32"/>
      <stop offset="50%" style="stop-color:#43A047"/>
      <stop offset="100%" style="stop-color:#66BB6A"/>
    </linearGradient>
    <linearGradient id="cane2Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#388E3C"/>
      <stop offset="50%" style="stop-color:#4CAF50"/>
      <stop offset="100%" style="stop-color:#81C784"/>
    </linearGradient>
    <linearGradient id="cane3Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1B5E20"/>
      <stop offset="50%" style="stop-color:#2E7D32"/>
      <stop offset="100%" style="stop-color:#43A047"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#66BB6A"/>
      <stop offset="100%" style="stop-color:#2E7D32"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#1565C0" flood-opacity="0.25"/>
    </filter>
    <filter id="caneShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#1B5E20" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background glow circle -->
  <ellipse cx="90" cy="105" rx="72" ry="70" fill="url(#bgGlow)" opacity="0.7"/>

  <!-- ===== SUGARCANE (behind clipboard) ===== -->
  <!-- Cane 1 (leftmost, slightly behind) -->
  <g filter="url(#caneShadow)">
    <rect x="108" y="62" width="14" height="95" rx="7" ry="7" fill="url(#cane3Grad)" transform="rotate(-8, 115, 110)"/>
    <!-- nodes -->
    <rect x="107" y="88" width="14" height="5" rx="2" fill="#F9A825" transform="rotate(-8, 115, 110)"/>
    <rect x="107" y="112" width="14" height="5" rx="2" fill="#F9A825" transform="rotate(-8, 115, 110)"/>
    <rect x="107" y="136" width="14" height="5" rx="2" fill="#F9A825" transform="rotate(-8, 115, 110)"/>
  </g>

  <!-- Cane 2 (middle) -->
  <g filter="url(#caneShadow)">
    <rect x="120" y="58" width="14" height="100" rx="7" ry="7" fill="url(#cane2Grad)" transform="rotate(2, 127, 108)"/>
    <!-- nodes -->
    <rect x="119" y="83" width="14" height="5" rx="2" fill="#F9A825" transform="rotate(2, 127, 108)"/>
    <rect x="119" y="107" width="14" height="5" rx="2" fill="#F9A825" transform="rotate(2, 127, 108)"/>
    <rect x="119" y="131" width="14" height="5" rx="2" fill="#F9A825" transform="rotate(2, 127, 108)"/>
  </g>

  <!-- Cane 3 (rightmost) -->
  <g filter="url(#caneShadow)">
    <rect x="132" y="65" width="14" height="92" rx="7" ry="7" fill="url(#cane1Grad)" transform="rotate(10, 139, 111)"/>
    <!-- nodes -->
    <rect x="131" y="90" width="14" height="5" rx="2" fill="#F9A825" transform="rotate(10, 139, 111)"/>
    <rect x="131" y="114" width="14" height="5" rx="2" fill="#F9A825" transform="rotate(10, 139, 111)"/>
    <rect x="131" y="138" width="14" height="5" rx="2" fill="#F9A825" transform="rotate(10, 139, 111)"/>
  </g>

  <!-- Leaf sprouts at top of cane -->
  <ellipse cx="112" cy="60" rx="18" ry="8" fill="url(#leafGrad)" transform="rotate(-40, 112, 60)"/>
  <ellipse cx="128" cy="55" rx="20" ry="8" fill="url(#leafGrad)" transform="rotate(-20, 128, 55)" opacity="0.95"/>
  <ellipse cx="143" cy="62" rx="16" ry="7" fill="url(#leafGrad)" transform="rotate(5, 143, 62)"/>
  <ellipse cx="120" cy="52" rx="22" ry="7" fill="#4CAF50" transform="rotate(-30, 120, 52)" opacity="0.8"/>

  <!-- ===== CLIPBOARD ===== -->
  <g filter="url(#shadow)">
    <!-- Clipboard body -->
    <rect x="30" y="52" width="105" height="120" rx="10" ry="10" fill="url(#clipboardGrad)"/>

    <!-- Paper inside -->
    <rect x="38" y="65" width="89" height="100" rx="6" ry="6" fill="url(#paperGrad)"/>

    <!-- Clip at top -->
    <rect x="68" y="43" width="30" height="22" rx="5" ry="5" fill="url(#clipGrad)"/>
    <rect x="74" y="48" width="18" height="12" rx="3" ry="3" fill="#1976D2"/>
    <!-- clip hole -->
    <ellipse cx="83" cy="54" rx="5" ry="4" fill="#0D47A1"/>
    <ellipse cx="83" cy="54" rx="3" ry="2.5" fill="#1565C0"/>

    <!-- Lines on paper -->
    <!-- Line 1 (shorter - title) -->
    <rect x="50" y="82" width="55" height="7" rx="3.5" fill="#42A5F5" opacity="0.9"/>
    <!-- Line 2 -->
    <rect x="50" y="98" width="68" height="6" rx="3" fill="#64B5F6" opacity="0.8"/>
    <!-- Line 3 -->
    <rect x="50" y="112" width="62" height="6" rx="3" fill="#64B5F6" opacity="0.8"/>
    <!-- Line 4 -->
    <rect x="50" y="126" width="65" height="6" rx="3" fill="#64B5F6" opacity="0.75"/>
    <!-- Line 5 (short) -->
    <rect x="50" y="140" width="40" height="6" rx="3" fill="#90CAF9" opacity="0.7"/>
  </g>
</svg>